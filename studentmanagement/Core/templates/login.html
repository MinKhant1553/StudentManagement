{% extends 'base.html' %}

{%load static %}

{% block title %}Login{% endblock %}

{% block content %}
<form method="POST" action ="{% url 'login' %}">
    {% csrf_token %}
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-header bg-white py-3 text-center">
                    <h4 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> User Login</h4>
                </div>
                <div class="card-body p-4">
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Username</label>
                        <input type="text" name="username" maxlength="150" autofocus required id="id_username" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Password</label>
                        <input type="password" name="password" required id="id_password" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </div>
            </div>
        </div>
    </div>
</form>
{% endblock %}
