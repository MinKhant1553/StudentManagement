{% extends "base.html" %}

{% block title %}Delete Student{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-danger shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Confirm Deletion</h4>
            </div>
            <div class="card-body text-center">
                <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
                <p class="lead mt-3">Are you sure you want to delete <strong>{{ student }}</strong>?</p>
                <p class="text-muted small">This action cannot be undone.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger">Yes, Delete Permanently</button>
                        <a href="{% url 'studentlist' %}" class="btn btn-light">No, Keep Student</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
